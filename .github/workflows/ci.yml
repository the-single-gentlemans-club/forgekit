name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  NX_BASE: ${{ github.event_name == 'pull_request' &&
    github.event.pull_request.base.sha || 'origin/main' }}
  NX_HEAD: ${{ github.sha }}

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Uncomment this line to enable task distribution
      - run: npm exec nx start-ci-run -- --distribute-on="3 linux-medium-js"
          --stop-agents-after="typecheck"

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      # Prepend any command with "nx-cloud record --" to record its logs to Nx Cloud
      - run: npm exec nx-cloud record -- npm exec nx format:check -- --base="$NX_BASE"
          --head="$NX_HEAD"
      - run: npm exec nx affected -t lint test build typecheck --base="$NX_BASE"
          --head="$NX_HEAD"

      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      - run: npm exec nx fix-ci
        if: always()
