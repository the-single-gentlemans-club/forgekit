name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  NX_BASE: ${{ github.event_name == 'pull_request' &&
    github.event.pull_request.base.sha || 'origin/master' }}
  NX_HEAD: ${{ github.sha }}

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - run: npm exec nx-cloud start-ci-run -- --distribute-on="3 linux-medium-js"
          --stop-agents-after="typecheck"
      - run: npm exec nx format:check -- --base="$NX_BASE" --head="$NX_HEAD"
      - run: npm exec nx affected -t lint test build typecheck --base="$NX_BASE"
          --head="$NX_HEAD"

      - run: npm exec nx fix-ci
        if: always()
